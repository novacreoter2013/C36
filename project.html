<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bright Random Picker</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            background-color: var(--bg-color);
            transition: background-color 0.2s ease;
            color: var(--text-color);
            overflow: hidden;
        }

        .display-container {
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #number-slot {
            font-size: 15rem;
            font-weight: 900;
            margin: 0;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.5);
        }

        .ui-panel {
            background: rgba(255, 255, 255, 0.8);
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 4px solid #000;
        }

        .inputs {
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }

        input {
            width: 80px;
            border: 3px solid #000;
            padding: 12px;
            border-radius: 12px;
            font-size: 1.2rem;
            text-align: center;
            font-weight: bold;
        }

        button {
            padding: 15px 50px;
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }

        button:active {
            transform: scale(0.9);
        }

        button:disabled {
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <div class="display-container">
        <h1 id="number-slot">?</h1>
    </div>

    <div class="ui-panel">
        <div class="inputs">
            <div>
                <small style="display:block;">MIN</small>
                <input type="number" id="minRange" value="1">
            </div>
            <div style="font-size: 1.5rem;">TO</div>
            <div>
                <small style="display:block;">MAX</small>
                <input type="number" id="maxRange" value="100">
            </div>
        </div>
        <button id="startBtn" onclick="pickRandom()">Spin!</button>
    </div>

    <script>
        var isSpinning = false;
        var display = document.getElementById('number-slot');
        var btn = document.getElementById('startBtn');

        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function updateBackground() {
            var h = Math.floor(Math.random() * 360);
            document.body.style.backgroundColor = "hsl(" + h + ", 100%, 60%)";
        }

        function pickRandom() {
            if (isSpinning) return;

            var min = parseInt(document.getElementById('minRange').value) || 0;
            var max = parseInt(document.getElementById('maxRange').value) || 100;

            if (min >= max) {
                alert("Max must be bigger!");
                return;
            }

            isSpinning = true;
            btn.disabled = true;

            var finalTarget = getRandomInt(min, max);
            var currentIteration = 0;
            var totalIterations = 40;
            var currentDelay = 30;

            function runSpin() {
                display.innerText = getRandomInt(min, max);
                
                updateBackground();

                if (currentIteration > totalIterations * 0.5) {
                    currentDelay += (currentIteration * 0.9);
                }

                currentIteration++;

                if (currentIteration < totalIterations) {
                    setTimeout(runSpin, currentDelay);
                } else {
                    display.innerText = finalTarget;
                    document.body.style.backgroundColor = "hsl(" + Math.random() * 360 + ", 100%, 50%)";
                    isSpinning = false;
                    btn.disabled = false;
                }
            }

            runSpin();
        }
    </script>
</body>
</html>
